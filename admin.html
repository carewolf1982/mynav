<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航管理后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="bg-light min-vh-100 py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4" id="login">
                <div class="card shadow-lg">
                    <div class="card-body text-center">
                        <h2 class="card-title mb-4">管理员登录</h2>
                        <input type="password" id="pwdInput" class="form-control mb-4" placeholder="输入管理密码">
                        <button onclick="login()" class="btn btn-primary w-100">登录</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container d-none" id="adminPanel">
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <h1 class="h3 text-primary"><i class="fa-solid fa-gear"></i> 导航管理后台</h1>
                    <div>
                        <button class="btn btn-outline-secondary me-2" onclick="showPwdModal()">
                            <i class="fa-solid fa-key"></i> 修改密码
                        </button>
                        <a href="/" class="btn btn-outline-primary">
                            <i class="fa-solid fa-home"></i> 返回首页
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-primary text-white">
                <i class="fa-solid fa-plus-circle"></i> 新增站点
            </div>
            <div class="card-body">
                <div class="row g-3 mb-3">
                    <div class="col-md-2">
                        <select id="newCat" class="form-select"></select>
                    </div>
                    <div class="col-md-2">
                        <input id="newTitle" class="form-control" placeholder="站点名称">
                    </div>
                    <div class="col-md-3">
                        <input id="newUrl" class="form-control" placeholder="网址">
                    </div>
                    <div class="col-md-2">
                        <select id="newIcon" class="form-select"></select>
                    </div>
                    <div class="col-md-2">
                        <input id="newIconColor" type="color" class="form-control" value="#007bff">
                    </div>
                    <div class="col-md-1">
                        <input id="newSort" type="number" class="form-control" placeholder="排序" value="0">
                    </div>
                </div>
                <textarea id="newDesc" class="form-control mb-3" placeholder="简介"></textarea>
                <button class="btn btn-primary" onclick="addLink()"><i class="fa-solid fa-plus"></i> 添加站点</button>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-success text-white">
                        <i class="fa-solid fa-folder-plus"></i> 新增分类
                    </div>
                    <div class="card-body">
                        <div class="row g-3 mb-3">
                            <div class="col-md-8">
                                <input id="newCatName" class="form-control" placeholder="分类名称">
                            </div>
                            <div class="col-md-4">
                                <input id="newCatSort" type="number" class="form-control" placeholder="排序" value="0">
                            </div>
                        </div>
                        <button class="btn btn-success" onclick="addCategory()"><i class="fa-solid fa-plus"></i> 添加分类</button>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-info text-white">
                        <i class="fa-solid fa-chart-line"></i> 新增股票
                    </div>
                    <div class="card-body">
                        <div class="row g-3 mb-3">
                            <div class="col-md-4">
                                <input id="newStockCode" class="form-control" placeholder="股票代码">
                            </div>
                            <div class="col-md-4">
                                <input id="newStockName" class="form-control" placeholder="股票名称">
                            </div>
                            <div class="col-md-4">
                                <input id="newStockSort" type="number" class="form-control" placeholder="排序" value="0">
                            </div>
                        </div>
                        <button class="btn btn-info text-white" onclick="addStock()"><i class="fa-solid fa-plus"></i> 添加股票</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-primary text-white">
                <i class="fa-solid fa-folder-open"></i> 分类列表
            </div>
            <div class="card-body">
                <table id="catTable" class="table table-hover"></table>
            </div>
        </div>

        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-primary text-white">
                <i class="fa-solid fa-link"></i> 站点列表
            </div>
            <div class="card-body">
                <table id="linkTable" class="table table-hover"></table>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <i class="fa-solid fa-chart-line"></i> 股票列表
            </div>
            <div class="card-body">
                <table id="stockTable" class="table table-hover"></table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="pwdModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title">修改密码</h3>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="password" id="oldPwd" class="form-control mb-3" placeholder="当前密码">
                    <input type="password" id="newPwd" class="form-control mb-3" placeholder="新密码">
                    <input type="password" id="confirmPwd" class="form-control" placeholder="确认新密码">
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button class="btn btn-primary" onclick="changePwd()">确认修改</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
