<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的私人导航</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <a href="/admin.html" class="admin-link">管理后台</a>
    
    <div class="weather-card" id="weatherCard">
        <div class="weather-icon" id="weatherIcon">🌤️</div>
        <div class="weather-main">
            <div class="weather-city" id="weatherCity">获取中...</div>
            <div class="weather-date" id="weatherDate">--</div>
            <div class="weather-temp" id="weatherTemp">--°C</div>
            <div class="weather-desc" id="weatherDesc">加载中</div>
        </div>
        <div class="weather-detail">
            <div class="weather-detail-row"><span class="label">最高</span><span id="weatherMax">--°</span></div>
            <div class="weather-detail-row"><span class="label">最低</span><span id="weatherMin">--°</span></div>
            <div class="weather-detail-row" id="weatherRainRow"><span class="label">降水</span><span id="weatherRain">--%</span></div>
        </div>
    </div>

    <div class="container">
        <h1>我的私人导航</h1>

        <div class="search-container">
            <div class="search-box">
                <div class="engine-selector">
                    <button class="engine-btn" onclick="toggleDropdown()">
                        <span class="engine-icon" id="currentEngineIcon"><svg viewBox="0 0 24 24"><path fill="#2319DC" d="M6.5 10.8c-.3 0-.5-.2-.5-.5V7.8c0-.3.2-.5.5-.5h1.3c.3 0 .5.2.5.5v2.5c0 .3-.2.5-.5.5H6.5zm4.9 0c-.3 0-.5-.2-.5-.5V7.8c0-.3.2-.5.5-.5h1.3c.3 0 .5.2.5.5v2.5c0 .3-.2.5-.5.5h-1.3zm4.9 0c-.3 0-.5-.2-.5-.5V7.8c0-.3.2-.5.5-.5h1.3c.3 0 .5.2.5.5v2.5c0 .3-.2.5-.5.5h-1.3z"/></svg></span>
                        <span id="currentEngineName">百度</span>
                    </button>
                    <div class="engine-dropdown" id="engineDropdown">
                        <div class="engine-option active" data-url="https://www.baidu.com/s?wd=" onclick="selectEngine(this)">
                            <span class="engine-icon"><svg viewBox="0 0 24 24"><path fill="#2319DC" d="M6.5 10.8c-.3 0-.5-.2-.5-.5V7.8c0-.3.2-.5.5-.5h1.3c.3 0 .5.2.5.5v2.5c0 .3-.2.5-.5.5H6.5zm4.9 0c-.3 0-.5-.2-.5-.5V7.8c0-.3.2-.5.5-.5h1.3c.3 0 .5.2.5.5v2.5c0 .3-.2.5-.5.5h-1.3zm4.9 0c-.3 0-.5-.2-.5-.5V7.8c0-.3.2-.5.5-.5h1.3c.3 0 .5.2.5.5v2.5c0 .3-.2.5-.5.5h-1.3z"/></svg></span>百度
                        </div>
                        <div class="engine-option" data-url="https://www.google.com/search?q=" onclick="selectEngine(this)">
                            <span class="engine-icon"><svg viewBox="0 0 24 24"><path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.4-1.6 4.1-5.5 4.1-3.3 0-6-2.7-6-6.1s2.7-6.1 6-6.1c1.9 0 3.1.8 3.8 1.5l2.6-2.5C16.8 3.5 14.6 2.5 12 2.5 6.8 2.5 2.5 6.8 2.5 12s4.3 9.5 9.5 9.5c5.5 0 9.1-3.9 9.1-9.3 0-.6-.1-1.1-.2-1.7H12z"/><path fill="#34A853" d="M3.9 7.3v.4C3.6 8.5 3.5 9.5 3.5 10.5c0 1 .1 2 .4 2.9l3.2-2.5C6.6 9 5.5 8 3.9 7.3z"/><path fill="#4285F4" d="M21.1 12.3c0-.6-.1-1.1-.2-1.7H12v3.9h5.5c-.2 1.4-.9 2.4-1.9 3.2l3 2.4c1.8-1.6 2.5-4 2.5-7.8z"/></svg></span>Google
                        </div>
                        <div class="engine-option" data-url="https://www.bing.com/search?q=" onclick="selectEngine(this)">
                            <span class="engine-icon"><svg viewBox="0 0 24 24"><path fill="#008373" d="M5 3v13.5l5-2.2V11l6 2.6-3 1.3-3-1.3v4.4l5 2.2L19 18V3l-7 3.2L5 3zm2 2.4l4.5 2 4.5-2v9.7L11 13l-4 1.7V5.4z"/><path fill="#0099FF" d="M5 3v13.5l5-2.2V11l6 2.6-3 1.3-3-1.3v4.4l5 2.2L19 18V3l-7 3.2L5 3z"/></svg></span>Bing
                        </div>
                        <div class="engine-option" data-url="https://search.bilibili.com/all?keyword=" onclick="selectEngine(this)">
                            <span class="engine-icon"><svg viewBox="0 0 24 24"><path fill="#00AEEC" d="M18.223 3.086a1.25 1.25 0 00-.88.373L15.5 5.307H8.5L6.658 3.459a1.25 1.25 0 00-1.765 1.765L6.674 7.05C3.89 7.497 1.25 8.975 1.25 12.25v5.5c0 2.834 2.298 5.125 5.132 5.125h11.237c2.834 0 5.132-2.291 5.132-5.125v-5.5c0-3.275-2.64-4.753-5.424-5.199l1.781-1.822a1.25 1.25 0 00-.886-2.143zM8.5 11a1 1 0 011 1v1.5a1 1 0 11-2 0V12a1 1 0 011-1zm7 0a1 1 0 011 1v1.5a1 1 0 11-2 0V12a1 1 0 011-1z"/></svg></span>哔哩哔哩
                        </div>
                        <div class="engine-option" data-url="https://github.com/search?q=" onclick="selectEngine(this)">
                            <span class="engine-icon"><svg viewBox="0 0 24 24"><path fill="#181717" d="M12 0C5.37 0 0 5.373 0 12c0 5.303 3.438 9.8 8.205 11.387.6.111.82-.261.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.297 24 12c0-6.627-5.373-12-12-12z"/></svg></span>GitHub
                        </div>
                    </div>
                </div>
                <input type="text" class="search-input" id="searchInput" placeholder="输入搜索内容，按 Enter 键搜索..." onkeypress="handleKeyPress(event)">
                <button class="search-btn" onclick="performSearch()"><svg viewBox="0 0 24 24" fill="white" width="22" height="22"><path d="M10 17l5-5-5-5v10z"/></svg></button>
            </div>
        </div>

        <div id="nav-container"></div>

        <div class="nav-group" id="stockGroup">
            <h2 class="group-title">股市指数</h2>
            <div class="stock-box" id="stockBox"></div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
