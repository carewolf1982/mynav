<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端自适应 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的私人导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #222;
            margin-bottom: 40px;
            font-size: 28px;
        }
        .nav-group {
            margin-bottom: 32px;
        }
        .group-title {
            font-size: 20px;
            color: #333;
            margin-bottom: 16px;
            padding-left: 8px;
            border-left: 4px solid #2563eb;
        }
        .link-box {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
        }
        .link-item a {
            display: block;
            background: #fff;
            padding: 16px 10px;
            text-align: center;
            border-radius: 10px;
            text-decoration: none;
            color: #1f2937;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: all 0.2s;
        }
        .link-item a:hover {
            background: #2563eb;
            color: white;
            transform: translateY(-3px);
        }
        /* 深色模式跟随系统 */
        @media (prefers-color-scheme: dark) {
            body {background: #111827;}
            h1,.group-title {color: #e5e7eb;}
            .link-item a {background: #1f2937; color: #e5e7eb;}
        }
    </style>
</head>
<body>
<div class="container">
    <h1>我的私人导航</h1>

    <!-- 第一组：常用工具 -->
    <div class="nav-group">
        <h2 class="group-title">常用工具</h2>
        <div class="link-box">
            <div class="link-item"><a href="https://www.baidu.com" target="_blank">百度</a></div>
            <div class="link-item"><a href="https://www.bing.com" target="_blank">必应</a></div>
            <div class="link-item"><a href="https://github.com" target="_blank">Github</a></div>
            <div class="link-item"><a href="https://gitee.com" target="_blank">Gitee</a></div>
        </div>
    </div>

    <!-- 第二组：影音娱乐 -->
    <div class="nav-group">
        <h2 class="group-title">影音娱乐</h2>
        <div class="link-box">
            <div class="link-item"><a href="https://www.bilibili.com" target="_blank">B站</a></div>
            <div class="link-item"><a href="https://v.qq.com" target="_blank">腾讯视频</a></div>
            <div class="link-item"><a href="https://music.163.com" target="_blank">网易云音乐</a></div>
        </div>
    </div>

    <!-- 第三组：自定义区域，自行增删 -->
    <div class="nav-group">
        <h2 class="group-title">工作站点</h2>
        <div class="link-box">
            <div class="link-item"><a href="这里替换成你的网址" target="_blank">自定义1</a></div>
            <div class="link-item"><a href="这里替换成你的网址" target="_blank">自定义2</a></div>
        </div>
    </div>
</div>
</body>
</html>
