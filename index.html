<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的私人导航</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <a href="/admin.html" class="admin-link">管理后台</a>
    
    <div class="weather-card" id="weatherCard">
        <div class="weather-icon" id="weatherIcon">🌤️</div>
        <div class="weather-main">
            <div class="weather-city" id="weatherCity">获取中...</div>
            <div class="weather-date" id="weatherDate">--</div>
            <div class="weather-temp" id="weatherTemp">--°C</div>
            <div class="weather-desc" id="weatherDesc">加载中</div>
        </div>
        <div class="weather-detail">
            <div class="weather-detail-row"><span class="label">最高</span><span id="weatherMax">--°</span></div>
            <div class="weather-detail-row"><span class="label">最低</span><span id="weatherMin">--°</span></div>
            <div class="weather-detail-row" id="weatherRainRow"><span class="label">降水</span><span id="weatherRain">--%</span></div>
        </div>
    </div>

    <div class="container">
        <h1>我的私人导航</h1>

        <div class="search-container">
            <div class="search-box">
                <div class="engine-selector">
                    <button class="engine-btn" onclick="toggleDropdown()">
                        <span class="engine-icon" id="currentEngineIcon"><svg viewBox="0 0 24 24" fill="#2319DC"><path d="M11.5 18.5c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6zm1-11.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zm-1 9c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm9-3.5h-3v-1.5h3V14h-3v-1h3V11h-3V9.5h3V9h-3V7.5h3V7h-3V5.5h3V5h-3V3.5h3V3h-3V1.5h3V1h-3V0h3v13.5z"/></svg></span>
                        <span id="currentEngineName">百度</span>
                    </button>
                    <div class="engine-dropdown" id="engineDropdown">
                        <div class="engine-option active" data-url="https://www.baidu.com/s?wd=" onclick="selectEngine(this)">
                            <span class="engine-icon"><svg viewBox="0 0 24 24" fill="#2319DC"><path d="M11.5 18.5c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6zm1-11.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zm-1 9c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm9-3.5h-3v-1.5h3V14h-3v-1h3V11h-3V9.5h3V9h-3V7.5h3V7h-3V5.5h3V5h-3V3.5h3V3h-3V1.5h3V1h-3V0h3v13.5z"/></svg></span>百度
                        </div>
                        <div class="engine-option" data-url="https://www.google.com/search?q=" onclick="selectEngine(this)">
                            <span class="engine-icon"><svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg></span>Google
                        </div>
                        <div class="engine-option" data-url="https://www.bing.com/search?q=" onclick="selectEngine(this)">
                            <span class="engine-icon"><svg viewBox="0 0 24 24" fill="#008373"><path d="M5 3v13.5l5-2.2V11l6 2.6-3 1.3-3-1.3v4.4l5 2.2L19 18V3l-7 3.2L5 3zm2 2.4l4.5 2 4.5-2v9.7L11 13l-4 1.7V5.4z"/></svg></span>Bing
                        </div>
                        <div class="engine-option" data-url="https://search.bilibili.com/all?keyword=" onclick="selectEngine(this)">
                            <span class="engine-icon"><svg viewBox="0 0 24 24" fill="#FB7299"><path d="M18.223 3.086a1.25 1.25 0 00-.88.373L15.5 5.307H8.5L6.658 3.459a1.25 1.25 0 00-1.765 1.765L6.674 7.05C3.89 7.497 1.25 8.975 1.25 12.25v5.5c0 2.834 2.298 5.125 5.132 5.125h11.237c2.834 0 5.132-2.291 5.132-5.125v-5.5c0-3.275-2.64-4.753-5.424-5.199l1.781-1.822a1.25 1.25 0 00-.886-2.143zM8.5 11a1 1 0 011 1v1.5a1 1 0 11-2 0V12a1 1 0 011-1zm7 0a1 1 0 011 1v1.5a1 1 0 11-2 0V12a1 1 0 011-1z"/></svg></span>哔哩哔哩
                        </div>
                        <div class="engine-option" data-url="https://github.com/search?q=" onclick="selectEngine(this)">
                            <span class="engine-icon"><svg viewBox="0 0 24 24" fill="#181717"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg></span>GitHub
                        </div>
                    </div>
                </div>
                <input type="text" class="search-input" id="searchInput" placeholder="输入搜索内容，按 Enter 键搜索..." onkeypress="handleKeyPress(event)">
                <button class="search-btn" onclick="performSearch()"><svg viewBox="0 0 24 24" fill="white" width="22" height="22"><path d="M10 17l5-5-5-5v10z"/></svg></button>
            </div>
        </div>

        <div id="nav-container"></div>

        <div class="nav-group" id="stockGroup">
            <h2 class="group-title">股市指数</h2>
            <div class="stock-box" id="stockBox"></div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
